version: "3.8"
services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=et_concierge
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  neo4j:
    image: neo4j:5.12
    environment:
      - NEO4J_AUTH=neo4j/local_password
    ports:
      - "7687:7687"
      - "7474:7474"
